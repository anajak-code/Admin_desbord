<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - AnajakCode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .maintenance-box {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .maintenance-icon {
            font-size: 80px;
            color: #f59e0b;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        p {
            color: #94a3b8;
            font-size: 16px;
            line-height: 1.6;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="maintenance-box">
        <div class="maintenance-icon">🔧</div>
        <h1>We'll Be Back Soon!</h1>
        <p id="maintenance-reason">Our site is currently under maintenance. We're working hard to bring you something awesome.</p>
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 14px;">Please check back in a few minutes.</p>
    </div>
    
    <script>
        // Fetch maintenance reason from API
        fetch('/api/maintenance-reason')
            .then(r => r.json())
            .then(data => {
                if (data.reason) {
                    document.getElementById('maintenance-reason').textContent = data.reason;
                }
            });
    </script>
</body>
</html>
